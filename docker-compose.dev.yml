version: '3.8'

services:
  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: otomeshon-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    networks:
      - otomeshon-dev-network
    restart: unless-stopped

  # Backend Development Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: otomeshon-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://otomeshon:password@postgres:5432/otomeshon
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - PYTHONPATH=/app
    depends_on:
      - postgres
      - redis
      - neo4j
    networks:
      - otomeshon-dev-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: otomeshon-postgres-dev
    environment:
      - POSTGRES_DB=otomeshon
      - POSTGRES_USER=otomeshon
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - otomeshon-dev-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: otomeshon-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - otomeshon-dev-network
    restart: unless-stopped

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15-community
    container_name: otomeshon-neo4j-dev
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_dev_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - otomeshon-dev-network
    restart: unless-stopped

  # Kafka for Event Streaming (Optional for dev)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: otomeshon-zookeeper-dev
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - otomeshon-dev-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: otomeshon-kafka-dev
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - "9092:9092"
    networks:
      - otomeshon-dev-network
    restart: unless-stopped

  # Development Tools
  pgadmin:
    image: dpage/pgadmin4:7
    container_name: otomeshon-pgadmin-dev
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@otomeshon.com
      - PGADMIN_DEFAULT_PASSWORD=password
    ports:
      - "5050:80"
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
    networks:
      - otomeshon-dev-network
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: otomeshon-redis-commander-dev
    environment:
      - REDIS_HOSTS=redis:redis:6379
    ports:
      - "8081:8081"
    networks:
      - otomeshon-dev-network
    restart: unless-stopped

networks:
  otomeshon-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
  redis_dev_data:
  neo4j_dev_data:
  pgadmin_dev_data: