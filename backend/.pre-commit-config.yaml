# Pre-commit hooks for Otomeshon Banking Platform
# Banking-grade code quality and security checks
# Install with: pre-commit install

repos:
  # Python code formatting and quality
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=88]
        exclude: ^migrations/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile, black, --line-length, "88"]
        exclude: ^migrations/

  - repo: https://github.com/pycqa/autoflake
    rev: v2.2.1
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-all-unused-imports
          - --remove-unused-variables
          - --remove-duplicate-keys
          - --ignore-init-module-imports
        exclude: ^migrations/

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=88, --extend-ignore=E203,W503]
        additional_dependencies:
          - flake8-docstrings
          - flake8-security
          - flake8-bandit
          - flake8-bugbear
        exclude: ^tests/

  - repo: https://github.com/pycqa/pylint
    rev: v3.0.3
    hooks:
      - id: pylint
        args: [--disable=C0114,C0115,C0116]  # Disable missing docstring warnings for now
        exclude: ^(tests/|migrations/)

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [--configfile, bandit.yaml, --severity-level, medium]
        exclude: ^tests/

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-python-dateutil
          - types-requests
          - types-PyYAML
          - sqlalchemy[mypy]
        args: [--ignore-missing-imports, --warn-return-any]
        exclude: ^(tests/|migrations/)

  # Generic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: debug-statements
      - id: check-builtin-literals

  # SQL formatting (for migration files)
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.0.2
    hooks:
      - id: sqlfluff-lint
        args: [--dialect, postgres]
        files: \.sql$
      - id: sqlfluff-fix
        args: [--dialect, postgres]
        files: \.sql$

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^tests/

  # Docker file linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3009]

  # Documentation checks
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        args: [--convention=google]
        exclude: ^(tests/|migrations/)

# Banking compliance specific checks
  - repo: local
    hooks:
      # Enhanced secrets check
      - id: check-hardcoded-secrets
        name: Check for hardcoded secrets
        entry: python scripts/check_secrets.py
        language: system
        files: \.(py|yml|yaml|json|env)$
        exclude: ^tests/

      # Banking compliance validation
      - id: banking-compliance-check
        name: Banking compliance validation
        entry: python scripts/validate_config.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]

      # Audit log validation
      - id: audit-log-validation
        name: Audit Log Validation
        entry: python scripts/audit_validator.py
        language: system
        files: (models|services).*\.py$
        exclude: ^tests/

      # Security configuration check
      - id: security-config-check
        name: Security Configuration Check
        entry: python scripts/security_config_checker.py
        language: system
        files: (config|settings).*\.py$

      # Database migration safety check
      - id: migration-safety-check
        name: Migration Safety Check
        entry: python scripts/migration_safety_checker.py
        language: system
        files: migrations/versions/.*\.py$

      # Performance regression check
      - id: performance-check
        name: Performance Regression Check
        entry: python scripts/performance_checker.py
        language: system
        files: (services|api).*\.py$
        exclude: ^tests/

default_stages: [commit]
default_language_version:
  python: python3.11

# Banking environment configurations
fail_fast: false  # Run all checks for comprehensive validation
minimum_pre_commit_version: 3.0.0

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false