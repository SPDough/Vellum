[pytest]
# Pytest configuration for Otomeshon Banking Platform

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests - fast, isolated tests
    integration: Integration tests - test component interactions
    banking: Banking-specific functionality tests
    security: Security and authentication tests
    performance: Performance and load tests
    compliance: Regulatory compliance tests
    slow: Tests that take longer than 5 seconds
    smoke: Critical path tests for quick validation
    benchmark: pytest-benchmark performance tests
    real_backend: Contract tests against app.main (full backend)

# Output configuration
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --durations=10
    --color=yes
    --disable-warnings

# Test coverage
# Uncomment to enable coverage reporting
# addopts = --cov=app --cov-report=html --cov-report=term-missing --cov-fail-under=80

# Async test configuration
asyncio_mode = auto

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*unclosed.*:ResourceWarning

# Test timeouts (in seconds) - requires pytest-timeout plugin
# timeout = 300
# timeout_method = thread

# Minimum Python version
minversion = 3.8