global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend API monitoring
  - job_name: 'otomeshon-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Frontend monitoring (via nginx)
  - job_name: 'otomeshon-frontend'
    static_configs:
      - targets: ['frontend:80']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL monitoring
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis monitoring
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Neo4j monitoring
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']
    metrics_path: '/metrics'

  # Node exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Kafka monitoring
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Application-specific metrics
  - job_name: 'otomeshon-websockets'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/api/v1/data-sandbox/ws/stats'
    scrape_interval: 10s

  # Custom business metrics
  - job_name: 'otomeshon-business-metrics'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics/business'
    scrape_interval: 60s