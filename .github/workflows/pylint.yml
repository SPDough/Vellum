name: Pylint

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches-ignore: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        cd backend && pip install -r requirements.txt
    - name: Analysing backend code with pylint
      run: |
        pylint --rcfile=.pylintrc backend/app/ backend/tests/ backend/*.py || true
    - name: Analysing root test files with pylint (duplicate-code disabled)
      run: |
        pylint --rcfile=.pylintrc --disable=duplicate-code *.py || true
